<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>最新消息詳情｜你儂我農</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="icon" type="image/png" href="https://storage.googleapis.com/cka101-15/form/farmLogo.png?v=20260613-transparent">
</head>
<body data-page="consumer" data-active-nav="news">
  <div id="headerHost"></div>
  <div id="app">
    <main style="max-width:920px;margin:0 auto;padding:32px 24px 64px">
      <p v-if="loadState === 'loading'" style="text-align:center;color:var(--muted);padding:48px 0;">載入中…</p>
      <div v-else-if="loadState.startsWith('error')" class="empty-state">{{ errorText(loadState) }}</div>
      <article v-else class="detail-body">
        <span class="eyebrow">最新消息</span>
        <h1 style="margin:6px 0 14px;font-size:clamp(28px,4vw,44px);line-height:1.2">{{ news.title }}</h1>
        <div class="meta-row" style="color:var(--muted);font-size:13px;margin-bottom:18px">
          <span>發布：{{ fmt(news.publishedAt) }}</span>
          <span>{{ news.publishedBy || "管理員" }}</span>
        </div>
        <div v-if="news.coverImageUrl && news.coverImageUrl.trim()" class="detail-cover"
             :style="{ backgroundImage: `url('${news.coverImageUrl}')`, minHeight: '300px', marginBottom: '22px' }"></div>
        <p v-if="news.summary" style="background:#f7f4ec;border-radius:8px;padding:14px 16px;line-height:1.9">{{ news.summary }}</p>
        <div style="white-space:pre-wrap;line-height:2;color:#3a463b;font-size:16px;margin-top:16px">{{ news.content || "" }}</div>
      </article>
    </main>
    <footer class="site-footer">
      <div><strong>你儂我農</strong><p>CFA104 第二組專題</p></div>
      <div class="footer-links"><a href="news.html">回最新消息</a></div>
    </footer>
  </div>
  <script src="vendors/vue/vue.global.js"></script>
  <script src="js/auth.js"></script><script src="js/header.js"></script>
  <script>
  const { createApp } = Vue;
  createApp({
    data() {
      return { news: null, loadState: "loading" };
    },
    mounted() {
      const id = new URLSearchParams(location.search).get("id");
      if (!id) { this.loadState = "error:缺少消息 id"; return; }
      this.loadNews(id);
    },
    methods: {
      async loadNews(id) {
        try {
          this.news = await NongAuth.request(`/api/news/${id}`);
          this.loadState = "ready";
        } catch (e) {
          this.loadState = "error:載入失敗：" + e.message;
        }
      },
      fmt(iso) {
        if (!iso) return "";
        const d = new Date(iso);
        const p = (n) => String(n).padStart(2, "0");
        return `${d.getFullYear()}/${p(d.getMonth() + 1)}/${p(d.getDate())}`;
      },
      errorText(state) {
        return state.startsWith("error:") ? state.slice(6) : "";
      }
    }
  }).mount("#app");
  </script>
</body>
</html>
