<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Console Admin</title>
  <link rel="stylesheet" href="css/styles.css">
  <style>
    body { background: #1a1a1a; color: #ddd; }
    .auth-card { background: #2a2a2a; color: #ddd; border-color: #444; }
    .field input { background: #1f1f1f; color: #ddd; border-color: #444; }
    .auth-card h1 { color: #fff; }
  </style>
  <link rel="icon" type="image/png" href="https://storage.googleapis.com/cka101-15/form/farmLogo.png?v=20260613-transparent">
</head>
<body data-page="auth">
  <main class="auth-wrapper" id="app">
    <section class="auth-card">
      <span class="eyebrow">restricted</span>
      <h1>Console Admin</h1>
      <p class="auth-foot" style="text-align:left;margin:0 0 18px;color:#aaa">For authorized administrators only.</p>

      <div class="auth-error" :class="{ 'is-visible': !!error }">{{ error }}</div>

      <form novalidate @submit.prevent="submit">
        <label class="field">
          <span style="color:#aaa">Admin Email</span>
          <input type="email" required autocomplete="off" v-model="email">
        </label>
        <label class="field">
          <span style="color:#aaa">Password</span>
          <input type="password" required autocomplete="off" v-model="password">
        </label>
        <button class="primary-button" type="submit">Sign in</button>
      </form>
    </section>
  </main>

  <script src="vendors/vue/vue.global.js"></script>
  <script src="js/auth.js"></script>
  <script>
    const { createApp } = Vue;
    createApp({
      data() {
        return { email: "", password: "", error: "" };
      },
      mounted() {
        // 進入隱藏入口先清掉前端會話，避免帶舊 token
        NongAuth.logoutAll();
      },
      methods: {
        async submit() {
          this.error = "";
          const email = this.email.trim();
          if (!email || !this.password) { this.error = "請輸入 Email 與密碼"; return; }
          try {
            const auth = await NongAuth.adminLogin(email, this.password);
            NongAuth.saveSession(auth);
            window.location.href = "admin.html";
          } catch (err) {
            this.error = err.message || "登入失敗";
          }
        }
      }
    }).mount("#app");
  </script>
</body>
</html>
