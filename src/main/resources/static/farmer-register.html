<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>小農申請｜你儂我農</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
        crossorigin=""/>
  <link rel="stylesheet" href="css/styles.css">
  <style>
    .farmer-card { max-width: 640px; }
    .notice {
      margin: 0 0 14px; padding: 10px 12px; border-radius: var(--radius);
      background: #fff7e6; color: #8a5a00; border: 1px solid #f3d68d; font-size: 13px;
    }
    .auth-ok {
      display: none; margin: 0 0 12px; padding: 10px 12px; border-radius: var(--radius);
      background: #e6f4ea; color: #1e7a3a; border: 1px solid #bfe3cb; font-size: 14px;
    }
    .auth-ok.is-visible { display: block; }
    .addr-row { display: flex; gap: 8px; align-items: stretch; }
    .addr-row input { flex: 1; }
    .locate-btn {
      flex-shrink: 0; padding: 0 14px; border: 1px solid var(--leaf, #4f9368);
      background: var(--leaf, #4f9368); color: #fff; border-radius: var(--radius);
      cursor: pointer; font-size: 14px; white-space: nowrap;
    }
    .locate-btn:disabled { opacity: .6; cursor: default; }
    #pickMap {
      height: 260px; border-radius: var(--radius); border: 1px solid var(--line, #ddd);
      margin-top: 6px;
    }
    .map-hint { margin: 6px 0 0; font-size: 12px; color: var(--muted, #888); }
    .coord-readout { font-size: 12px; color: var(--muted, #888); }
  </style>
  <link rel="icon" type="image/png" href="https://storage.googleapis.com/cka101-15/form/farmLogo.png?v=20260613-transparent">
</head>
<body data-page="auth">
  <header class="site-header">
    <a class="brand" href="index.html" aria-label="Farmily 首頁">
      <span class="brand-seal">F</span>
      <span><strong>Farmily</strong><small>Farmily</small></span>
    </a>
    <nav class="utility-nav">
      <a href="index.html">回到首頁</a>
      <a href="login.html">小農登入</a>
    </nav>
  </header>

  <main class="auth-wrapper" id="app">
    <section class="auth-card farmer-card">
      <span class="eyebrow">farmer application</span>
      <h1>小農申請入口</h1>
      <div class="notice">
        ⚠ 小農帳號需通過管理員審核才能登入。請務必填寫真實資料並上傳證明文件。
        審核期間請耐心等待。會員(消費者)註冊請點 <a href="register.html">這裡</a>。
      </div>

      <div class="auth-error" :class="{ 'is-visible': !!error }">{{ error }}</div>
      <div class="auth-ok" :class="{ 'is-visible': !!ok }">{{ ok }}</div>

      <form novalidate @submit.prevent="submit">
        <label class="field">
          <span>農場名稱</span>
          <input type="text" maxlength="50" required v-model="form.farmName">
        </label>
        <label class="field">
          <span>Email(登入帳號)</span>
          <input type="email" maxlength="50" required autocomplete="email" v-model="form.email">
        </label>
        <label class="field">
          <span>密碼(6-64 字元)</span>
          <input type="password" minlength="6" maxlength="64" required autocomplete="new-password" v-model="form.password">
        </label>
        <label class="field">
          <span>農場地址</span>
          <div class="addr-row">
            <!-- 地址與座標由 FarmLocationPicker 直接操作 DOM，維持 id 綁定 -->
            <input type="text" id="farmAddress" maxlength="100" required placeholder="例:南投縣埔里鎮中山路一段123號">
            <button type="button" class="locate-btn" id="locateBtn">在地圖上定位</button>
          </div>
        </label>
        <label class="field">
          <span>聯絡電話</span>
          <input type="tel" maxlength="20" placeholder="09xx-xxx-xxx" v-model="form.phone">
        </label>
        <label class="field">
          <span>農場介紹</span>
          <textarea rows="3" maxlength="2000" placeholder="作物、栽種理念、特色等" v-model="form.farmDesc"></textarea>
        </label>
        <label class="field">
          <span>農場位置(選填,會顯示在產地地圖上)</span>
          <div id="pickMap"></div>
          <p class="map-hint">
            填好地址後按「在地圖上定位」,或直接<strong>點地圖 / 拖曳標記</strong>來標出農場確切位置。
            <span class="coord-readout" id="coordReadout">尚未設定座標</span>
          </p>
        </label>
        <input type="hidden" id="locLat">
        <input type="hidden" id="locLong">
        <label class="field">
          <span>證明文件類型</span>
          <select required v-model="form.certType">
            <option value="">-- 請選擇 --</option>
            <option value="IDENTITY">身分證明</option>
            <option value="LAND">土地證明</option>
            <option value="PRODUCT">農產品證明</option>
          </select>
        </label>
        <label class="field">
          <span>上傳證明文件(jpg/png/pdf,最大 5MB)</span>
          <input type="file" accept="image/*,application/pdf" @change="onFileChange">
        </label>
        <button class="primary-button" type="submit" :disabled="submitting">{{ submitting ? "送出中…" : "送出申請" }}</button>
      </form>
    </section>
  </main>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
          integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
          crossorigin=""></script>
  <script src="js/farm-location-picker.js?v=20260615-locpicker"></script>
  <script src="vendors/vue/vue.global.js"></script>
  <script src="js/auth.js"></script>
  <script>
    const { createApp } = Vue;
    createApp({
      data() {
        return {
          form: { farmName: "", email: "", password: "", phone: "", farmDesc: "", certType: "" },
          certFile: null,
          error: "",
          ok: "",
          submitting: false
        };
      },
      mounted() {
        // 地圖選點 + 地址定位：邏輯仍在 js/farm-location-picker.js，這裡接訊息回呼
        FarmLocationPicker.create({
          mapId: "pickMap",
          latInputId: "locLat",
          lngInputId: "locLong",
          addressInputId: "farmAddress",
          locateBtnId: "locateBtn",
          coordReadoutId: "coordReadout",
          onOk: (msg) => { this.ok = msg; this.error = ""; },
          onError: (msg) => { this.error = msg; this.ok = ""; }
        });
      },
      methods: {
        onFileChange(e) {
          this.certFile = e.target.files[0] || null;
        },
        readFileAsBase64(file) {
          return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = () => resolve(reader.result); // 含 data: 前綴，後端會剝掉
            reader.onerror = reject;
            reader.readAsDataURL(file);
          });
        },
        async submit() {
          const farmName = this.form.farmName.trim();
          const email = this.form.email.trim();
          const password = this.form.password;
          // 地址與座標由 picker 寫入 DOM，提交時直接讀取
          const farmAddress = document.getElementById("farmAddress").value.trim();
          const locLatStr = document.getElementById("locLat").value;
          const locLongStr = document.getElementById("locLong").value;

          if (!farmName || !email || !password || !farmAddress) {
            this.error = "農場名稱、Email、密碼、農場地址皆為必填"; this.ok = ""; return;
          }
          if (this.certFile && this.certFile.size > 5 * 1024 * 1024) {
            this.error = "檔案超過 5MB"; this.ok = ""; return;
          }
          let certFileBase64 = null;
          if (this.certFile) {
            try { certFileBase64 = await this.readFileAsBase64(this.certFile); }
            catch { this.error = "無法讀取檔案"; this.ok = ""; return; }
          }

          this.submitting = true;
          try {
            await NongAuth.farmerRegister({
              email, password, farmName, farmAddress,
              phone: this.form.phone.trim() || null,
              farmDesc: this.form.farmDesc.trim() || null,
              locLat: locLatStr ? Number(locLatStr) : null,
              locLong: locLongStr ? Number(locLongStr) : null,
              certType: this.form.certType || null,
              certFileBase64
            });
            this.ok = "申請已送出,待管理員審核通過後即可登入。3 秒後回到首頁…";
            this.error = "";
            setTimeout(() => { location.href = "index.html"; }, 3000);
          } catch (err) {
            this.error = err.message || "申請失敗";
            this.ok = "";
          } finally {
            this.submitting = false;
          }
        }
      }
    }).mount("#app");
  </script>
</body>
</html>
