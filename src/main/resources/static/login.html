<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登入｜你儂我農</title>
  <link rel="stylesheet" href="css/styles.css">
  <style>
    .role-tabs { display: flex; gap: 8px; margin: 0 0 16px; }
    .role-tab {
      flex: 1; padding: 10px 12px; border-radius: var(--radius);
      border: 1px solid var(--line); background: #fff; color: var(--muted);
      font-size: 14px; font-family: inherit; cursor: pointer;
    }
    .role-tab.is-active { background: var(--leaf); color: #fff; border-color: var(--leaf); }
    .register-links { display: flex; flex-direction: column; gap: 6px; margin-top: 8px; }
    .register-links a { color: var(--leaf); }
  </style>
  <link rel="icon" type="image/png" href="https://storage.googleapis.com/cka101-15/form/farmLogo.png?v=20260613-transparent">
</head>
<body data-page="auth">
  <header class="site-header">
    <a class="brand" href="index.html" aria-label="Farmily 首頁">
      <span class="brand-seal">F</span>
      <span><strong>Farmily</strong><small>Farmily</small></span>
    </a>
    <nav class="utility-nav">
      <a href="index.html">回到首頁</a>
      <a href="register.html">註冊會員</a>
    </nav>
  </header>

  <main class="auth-wrapper" id="app">
    <section class="auth-card">
      <span class="eyebrow">member / farmer login</span>
      <h1>歡迎回來</h1>
      <p class="auth-foot" style="text-align:left;margin:0 0 14px">請選擇身份後輸入帳號密碼。會員與小農為各自獨立的帳號。</p>

      <div class="role-tabs" role="tablist">
        <button type="button" class="role-tab" :class="{ 'is-active': currentRole === 'MEMBER' }" role="tab" @click="currentRole = 'MEMBER'">會員</button>
        <button type="button" class="role-tab" :class="{ 'is-active': currentRole === 'FARMER' }" role="tab" @click="currentRole = 'FARMER'">小農</button>
      </div>

      <div class="auth-error" :class="{ 'is-visible': !!error }">{{ error }}</div>

      <form novalidate @submit.prevent="submit">
        <label class="field">
          <span>Email</span>
          <input type="email" v-model="email" placeholder="you@example.com" required autocomplete="email">
        </label>
        <label class="field">
          <span>密碼</span>
          <input type="password" v-model="password" placeholder="••••••••" required autocomplete="current-password">
        </label>
        <button class="primary-button" type="submit">登入</button>
      </form>

      <div class="register-links">
        <p class="auth-foot" style="margin:14px 0 0">還沒有會員帳號？<a href="register.html">註冊新會員</a></p>
        <p class="auth-foot" style="margin:0">想成為小農？<a href="farmer-register.html">小農申請入口</a>（需審核）</p>
      </div>
    </section>
  </main>

  <script src="vendors/vue/vue.global.js"></script>
  <script src="js/auth.js"></script>
  <script>
    const { createApp } = Vue;
    createApp({
      data() {
        return { currentRole: "MEMBER", email: "", password: "", error: "" };
      },
      mounted() {
        NongAuth.logoutBackoffice();
        const reason = new URLSearchParams(window.location.search).get("reason");
        const messages = { auth: "請先登入", role: "帳號身份不符，請重新登入", logout: "您已登出", expired: "登入逾期，請重新登入" };
        if (messages[reason]) this.error = messages[reason];
      },
      methods: {
        async submit() {
          this.error = "";
          const email = this.email.trim();
          if (!email || !this.password) { this.error = "請輸入 Email 與密碼"; return; }
          try {
            const auth = await NongAuth.login(email, this.password, this.currentRole);
            NongAuth.saveSession(auth);
            NongAuth.redirectAfterLogin(auth);
          } catch (err) {
            this.error = err.message || "登入失敗";
          }
        }
      }
    }).mount("#app");
  </script>
</body>
</html>
