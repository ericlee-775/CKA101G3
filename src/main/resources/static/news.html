<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>最新消息｜你儂我農</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="icon" type="image/png" href="https://storage.googleapis.com/cka101-15/form/farmLogo.png?v=20260613-transparent">
</head>
<body data-page="consumer" data-active-nav="news">
  <div id="headerHost"></div>
  <div id="app">
    <section class="page-header">
      <span class="eyebrow">news</span>
      <h1>最新消息</h1>
      <p>平台公告與重要更新。</p>
    </section>
    <main class="product-grid" style="max-width:1180px;margin:0 auto;padding:0 24px 64px">
      <p v-if="listState === 'loading'" style="grid-column:1/-1;text-align:center;color:var(--muted);padding:48px 0;">載入中…</p>
      <div v-else-if="listState === 'empty'" class="empty-state" style="grid-column:1/-1">目前沒有最新消息。</div>
      <div v-else-if="listState.startsWith('error')" class="empty-state" style="grid-column:1/-1">{{ errorText(listState) }}</div>
      <article v-else v-for="n in news" :key="n.id" class="product-card">
        <a :href="`news-detail.html?id=${n.id}`" class="product-image" :style="{ backgroundImage: `url('${newsImage(n)}')` }" role="img"></a>
        <div class="product-body">
          <div class="product-meta"><span>{{ fmt(n.publishedAt) }}</span><span>{{ n.publishedBy || "管理員" }}</span></div>
          <h3><a :href="`news-detail.html?id=${n.id}`">{{ n.title }}</a></h3>
          <p>{{ n.summary || "" }}</p>
          <div class="product-meta" style="margin-top:8px"><a class="secondary-button" :href="`news-detail.html?id=${n.id}`">閱讀全文</a></div>
        </div>
      </article>
    </main>
    <footer class="site-footer">
      <div><strong>你儂我農</strong><p>CFA104 第二組專題</p></div>
      <div class="footer-links"><a href="blogs.html">部落格</a><a href="products.html">看商品</a></div>
    </footer>
  </div>
  <script src="vendors/vue/vue.global.js"></script>
  <script src="js/auth.js"></script><script src="js/header.js"></script>
  <script>
  const { createApp } = Vue;
  createApp({
    data() {
      return { news: [], listState: "loading" };
    },
    mounted() {
      this.loadNews();
    },
    methods: {
      async loadNews() {
        this.listState = "loading";
        try {
          const page = await NongAuth.request("/api/news?size=24");
          this.news = page.content || [];
          this.listState = this.news.length ? "ready" : "empty";
        } catch (e) {
          this.listState = "error:載入失敗：" + e.message;
        }
      },
      newsImage(n) {
        return (n.coverImageUrl && n.coverImageUrl.trim()) || "https://images.unsplash.com/photo-1500382017468-9049fed747ef?w=900";
      },
      fmt(iso) {
        if (!iso) return "";
        const d = new Date(iso);
        const p = (n) => String(n).padStart(2, "0");
        return `${d.getFullYear()}/${p(d.getMonth() + 1)}/${p(d.getDate())}`;
      },
      errorText(state) {
        return state.startsWith("error:") ? state.slice(6) : "";
      }
    }
  }).mount("#app");
  </script>
</body>
</html>
