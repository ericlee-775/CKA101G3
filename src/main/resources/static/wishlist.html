<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的收藏｜你儂我農</title>
  <link rel="stylesheet" href="css/styles.css">
  <style>
    .wl-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(240px,1fr)); gap:18px; max-width:1180px; margin:0 auto; padding:0 24px 64px; }
    .wl-card { background:#fff; border-radius:14px; overflow:hidden; box-shadow:0 1px 4px rgba(0,0,0,.06); display:flex; flex-direction:column; transition:transform .15s, box-shadow .15s; }
    .wl-card:hover { transform:translateY(-2px); box-shadow:0 8px 20px rgba(74,124,42,.1); }
    .wl-cover { height:170px; background:#eee center/cover no-repeat; display:block; }
    .wl-body { padding:14px 16px 16px; display:flex; flex-direction:column; gap:6px; flex:1; }
    .wl-meta { display:flex; justify-content:space-between; color:var(--muted); font-size:12px; }
    .wl-title { color:#3a463b; font-weight:600; font-size:16px; line-height:1.4; text-decoration:none; }
    .wl-title:hover { color:var(--leaf); }
    .wl-price { font-size:18px; font-weight:600; color:#3a463b; margin-top:auto; }
    .wl-price small { color:var(--muted); font-weight:400; font-size:13px; }
    .wl-actions { display:flex; gap:8px; margin-top:8px; }
    .wl-actions .primary-button { flex:1; padding:8px 10px; font-size:13px; }
    .wl-actions .icon-btn { background:#fff4f0; color:var(--clay); border:none; border-radius:10px; padding:0 12px; cursor:pointer; font-size:16px; }
    .wl-actions .icon-btn:hover { background:#fde0d4; }
    .wl-card.is-unavailable .wl-cover { filter:grayscale(0.8); }
    .wl-badge-out { color:var(--clay); font-size:12px; font-weight:600; }
  </style>
  <link rel="icon" type="image/png" href="https://storage.googleapis.com/cka101-15/form/farmLogo.png?v=20260613-transparent">
</head>
<body data-page="consumer" data-active-nav="">
  <div id="headerHost"></div>
  <div id="app">
    <section class="page-header">
      <span class="eyebrow">my wishlist</span>
      <h1>我的收藏</h1>
      <p>{{ subtitle }}</p>
    </section>
    <main class="wl-grid">
      <p v-if="gate === 'loading'" style="grid-column:1/-1;text-align:center;color:var(--muted);padding:48px 0;">載入中…</p>
      <div v-else-if="gate === 'non-member'" class="empty-state" style="grid-column:1/-1">目前身份不是會員，無法使用收藏。</div>
      <div v-else-if="gate.startsWith('error')" class="empty-state" style="grid-column:1/-1">{{ errorText(gate) }}</div>
      <div v-else-if="!items.length" class="empty-state" style="grid-column:1/-1">
        還沒有收藏任何商品。
        <a class="primary-button" href="products.html" style="margin-left:12px">去逛商品</a>
      </div>
      <article v-else v-for="it in items" :key="it.productId" class="wl-card" :class="{ 'is-unavailable': !it.available }">
        <a :href="`product-detail.html?id=${it.productId}`" class="wl-cover" :style="{ backgroundImage: `url('${coverImage(it)}')` }" role="img" :aria-label="it.name"></a>
        <div class="wl-body">
          <div class="wl-meta"><span>{{ it.farmerName || "" }}</span><span>{{ it.categoryName || "" }}</span></div>
          <a :href="`product-detail.html?id=${it.productId}`" class="wl-title">{{ it.name }}</a>
          <div v-if="!it.available" class="wl-badge-out">⚠ 已下架或缺貨</div>
          <div class="wl-price">{{ currency(it.price) }} <small>/ {{ it.unit || "件" }}</small></div>
          <div class="wl-actions">
            <button class="primary-button" :disabled="!it.available || it._adding" @click="addToCart(it)">{{ it._adding ? "加入中…" : "加入購物車" }}</button>
            <button class="icon-btn" title="移除收藏" @click="removeItem(it)">♥</button>
          </div>
        </div>
      </article>
    </main>
    <footer class="site-footer">
      <div><strong>你儂我農</strong><p>CFA104 第二組專題</p></div>
      <div class="footer-links"><a href="products.html">繼續逛商品</a></div>
    </footer>
    <div class="toast-flash" :class="{ 'is-visible': toast.visible, 'is-error': toast.error }">{{ toast.msg }}</div>
  </div>
  <script src="vendors/vue/vue.global.js"></script>
  <script src="js/auth.js"></script><script src="js/header.js"></script>
  <script>
  const { createApp } = Vue;
  const WL_FALLBACK_IMG = "https://images.unsplash.com/photo-1488459716781-31db52582fe9?w=900";
  createApp({
    data() {
      return {
        gate: "loading", // loading / non-member / ready / error:訊息
        items: [],
        toast: { msg: "", error: false, visible: false },
        toastTimer: null
      };
    },
    computed: {
      subtitle() {
        if (this.gate !== "ready" || !this.items.length) return "把喜歡的商品先收進來，方便下次回購或追蹤庫存。";
        return `目前收藏了 ${this.items.length} 個商品。`;
      }
    },
    mounted() {
      const user = NongAuth.getConsumerUser();
      if (!user) { location.href = "login.html?reason=auth"; return; }
      if (user.type !== "MEMBER") { this.gate = "non-member"; return; }
      this.reload();
    },
    methods: {
      async reload() {
        try {
          const page = await NongAuth.request("/api/wishlist?size=48");
          this.items = page.content || [];
          this.gate = "ready";
        } catch (e) {
          this.gate = "error:載入失敗：" + e.message;
        }
      },
      async removeItem(it) {
        try {
          await NongAuth.request(`/api/wishlist/products/${it.productId}`, { method: "DELETE" });
          this.showToast("已移除");
          await this.reload();
        } catch (err) {
          this.showToast(err.message || "失敗", true);
        }
      },
      async addToCart(it) {
        it._adding = true;
        try {
          await NongAuth.request("/api/cart/items", { method: "POST", body: JSON.stringify({ productId: Number(it.productId), quantity: 1 }) });
          this.showToast("已加入購物車");
          if (NongHeader.refreshCartBadge) await NongHeader.refreshCartBadge();
        } catch (err) {
          this.showToast(err.message || "失敗", true);
        } finally {
          it._adding = false;
        }
      },
      coverImage(it) {
        return (it.imageUrl && it.imageUrl.trim()) || WL_FALLBACK_IMG;
      },
      currency(v) {
        return `NT$ ${Number(v).toLocaleString("zh-TW")}`;
      },
      showToast(msg, isError) {
        this.toast = { msg, error: !!isError, visible: true };
        clearTimeout(this.toastTimer);
        this.toastTimer = setTimeout(() => { this.toast.visible = false; }, 1800);
      },
      errorText(state) {
        return state.startsWith("error:") ? state.slice(6) : "";
      }
    }
  }).mount("#app");
  </script>
</body>
</html>
