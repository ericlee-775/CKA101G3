<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>小農審核｜管理員後台</title>
  <link rel="stylesheet" href="css/styles.css">
  <style>
    .review-grid { display: grid; grid-template-columns: minmax(260px, 320px) 1fr; gap: 24px; }
    @media (max-width: 900px) { .review-grid { grid-template-columns: 1fr; } }
    .review-list { display: flex; flex-direction: column; gap: 8px; max-height: 70vh; overflow-y: auto; }
    .review-list-item { padding: 12px 14px; border-radius: 10px; background: var(--surface, #fff); border: 1px solid var(--line, #e2e2dc); cursor: pointer; transition: background .15s; }
    .review-list-item:hover { background: var(--bg-soft, #f3f0e6); }
    .review-list-item.is-active { background: var(--accent-soft, #eaf3df); border-color: var(--accent, #4a7c2a); }
    .review-list-item .farm-name { font-weight: 600; }
    .review-list-item .email { font-size: 12px; color: var(--muted, #888); }
    .review-detail { padding: 20px; background: var(--surface, #fff); border-radius: 12px; border: 1px solid var(--line, #e2e2dc); }
    .detail-row { display: flex; gap: 12px; margin-bottom: 10px; }
    .detail-row dt { width: 100px; color: var(--muted, #888); flex-shrink: 0; }
    .detail-row dd { margin: 0; flex: 1; }
    .action-row { margin-top: 24px; display: flex; gap: 12px; }
    .action-row .approve { background: var(--accent, #4a7c2a); color: #fff; }
    .action-row .reject { background: #c0392b; color: #fff; }
    .empty-hint { text-align: center; color: var(--muted, #888); padding: 40px 20px; }
  </style>
  <link rel="icon" type="image/png" href="https://storage.googleapis.com/cka101-15/form/farmLogo.png?v=20260613-transparent">
</head>
<body data-page="admin" data-active-side="farmer-reviews">
  <div id="headerHost"></div>
  <main class="dashboard-layout admin-tone">
    <div id="sidebarHost"></div>
    <section class="dashboard-main" id="app">
      <div class="dashboard-hero">
        <div>
          <span class="eyebrow">farmer reviews</span>
          <h2>小農送審</h2>
          <p>新註冊的小農預設 cert_passed=false，需在此通過審核後才能登入後台。</p>
        </div>
        <span class="session-pill">{{ loadState === 'loading' ? "—" : pending.length }} 筆待審</span>
      </div>

      <article class="panel-card is-large" style="grid-column:1/-1">
        <div class="review-grid">
          <div class="review-list">
            <div v-if="loadState === 'loading'" class="empty-hint">載入中…</div>
            <div v-else-if="loadState.startsWith('error')" class="empty-hint" style="color:var(--clay)">{{ errorText(loadState) }}</div>
            <div v-else-if="!pending.length" class="empty-hint">目前沒有待審小農 🎉</div>
            <div v-else v-for="f in pending" :key="f.id" class="review-list-item" :class="{ 'is-active': f.id === activeId }" @click="activeId = f.id">
              <div class="farm-name">{{ f.farmName || "(未填農場名)" }}</div>
              <div class="email">{{ f.email }}</div>
              <div class="email">送出 {{ fmt(f.createdAt) }}</div>
            </div>
          </div>
          <div class="review-detail">
            <div v-if="!active" class="empty-hint">從左側選一筆待審小農查看詳情</div>
            <template v-else>
              <h3 style="margin-top:0">{{ active.farmName || "(未填農場名)" }}</h3>
              <dl>
                <div class="detail-row"><dt>Email</dt><dd>{{ active.email }}</dd></div>
                <div class="detail-row"><dt>聯絡電話</dt><dd>{{ active.phone || "—" }}</dd></div>
                <div class="detail-row"><dt>農場地址</dt><dd>{{ active.farmAddress || "—" }}</dd></div>
                <div class="detail-row"><dt>農場介紹</dt><dd style="white-space:pre-wrap">{{ active.farmDesc || "—" }}</dd></div>
                <div class="detail-row"><dt>證明文件</dt><dd>{{ certLabels[active.certType] || active.certType || "—" }} ・ {{ active.hasCertFile ? "✅ 已上傳" : "❌ 未上傳" }}</dd></div>
                <div class="detail-row"><dt>上傳時間</dt><dd>{{ fmt(active.uploadedAt) }}</dd></div>
                <div class="detail-row"><dt>註冊時間</dt><dd>{{ fmt(active.createdAt) }}</dd></div>
                <div class="detail-row"><dt>目前狀態</dt><dd>cert_passed={{ active.certPassed ? "true" : "false" }} ・ status={{ active.status }}</dd></div>
              </dl>
              <div class="action-row">
                <button class="primary-button approve" @click="approve">✅ 通過審核</button>
                <button class="primary-button reject" @click="reject">❌ 駁回</button>
              </div>
            </template>
          </div>
        </div>
      </article>

      <div class="toast-flash" :class="{ 'is-visible': toast.visible, 'is-error': toast.error }">{{ toast.msg }}</div>
    </section>
  </main>

  <script src="vendors/vue/vue.global.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/admin-shell.js"></script>
  <script>
  const { createApp } = Vue;
  createApp({
    data() {
      return {
        pending: [],
        activeId: null,
        loadState: "loading",
        certLabels: { IDENTITY: "身分證明", LAND: "土地證明", PRODUCT: "農產品證明" },
        toast: { msg: "", error: false, visible: false },
        toastTimer: null
      };
    },
    computed: {
      active() {
        return this.activeId ? this.pending.find((x) => x.id === this.activeId) : null;
      }
    },
    mounted() {
      this.reload();
    },
    methods: {
      async reload() {
        this.loadState = "loading";
        try {
          this.pending = await NongAuth.request("/api/admin/farmers/pending");
          this.loadState = "ready";
        } catch (e) {
          this.loadState = "error:載入失敗：" + e.message;
        }
      },
      async approve() {
        if (!this.activeId || !confirm("確定通過此小農的審核？")) return;
        try {
          await NongAuth.request(`/api/admin/farmers/${this.activeId}/cert-pass`, { method: "POST" });
          this.showToast("已通過");
          this.activeId = null;
          await this.reload();
        } catch (err) {
          this.showToast(err.message || "操作失敗", true);
        }
      },
      async reject() {
        if (!this.activeId || !confirm("確定駁回此小農的審核？（會把 cert_passed 設回 false）")) return;
        try {
          await NongAuth.request(`/api/admin/farmers/${this.activeId}/cert-reject`, { method: "POST" });
          this.showToast("已駁回");
          this.activeId = null;
          await this.reload();
        } catch (err) {
          this.showToast(err.message || "操作失敗", true);
        }
      },
      fmt(iso) {
        if (!iso) return "—";
        const d = new Date(iso);
        const p = (n) => String(n).padStart(2, "0");
        return `${d.getFullYear()}/${p(d.getMonth() + 1)}/${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}`;
      },
      showToast(msg, isError) {
        this.toast = { msg, error: !!isError, visible: true };
        clearTimeout(this.toastTimer);
        this.toastTimer = setTimeout(() => { this.toast.visible = false; }, 1800);
      },
      errorText(state) {
        return state.startsWith("error:") ? state.slice(6) : "";
      }
    }
  }).mount("#app");
  </script>
</body>
</html>
