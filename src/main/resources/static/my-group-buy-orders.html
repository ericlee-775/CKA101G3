<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的團購整單｜你儂我農</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="icon" type="image/png" href="https://storage.googleapis.com/cka101-15/form/farmLogo.png?v=20260613-transparent">
</head>
<body data-page="consumer" data-active-nav="">
  <div id="headerHost"></div>
  <div id="app">
    <section class="page-header">
      <span class="eyebrow">my hosted orders</span>
      <h1>我發起並成團的整單</h1>
      <p>由你開團、達標成立的訂單彙整，可查看出貨進度。</p>
    </section>
    <main class="detail-body">
      <p v-if="loadState === 'loading'" style="text-align:center;color:var(--muted);padding:48px 0;">載入中…</p>
      <div v-else-if="loadState === 'empty'" class="empty-state">還沒有成團的整單。</div>
      <div v-else-if="loadState.startsWith('error')" class="empty-state">{{ errorText(loadState) }}</div>
      <table v-else class="cart-table">
        <thead><tr><th>團購</th><th>商品</th><th>份數</th><th>總金額</th><th>狀態</th><th></th></tr></thead>
        <tbody>
          <tr v-for="(o, i) in orders" :key="i">
            <td>#{{ o.groupBuyId || "" }}</td>
            <td><strong>{{ o.productName || "" }}</strong></td>
            <td>{{ o.totalQuantity || 0 }}</td>
            <td>{{ currency(o.totalAmount || 0) }}</td>
            <td><span class="status-tag">{{ o.status || "" }}</span></td>
            <td><a v-if="o.groupBuyId" class="user-btn ghost" :href="`group-buy-detail.html?id=${o.groupBuyId}`">查看</a></td>
          </tr>
        </tbody>
      </table>
    </main>
    <footer class="site-footer">
      <div><strong>你儂我農</strong><p>CFA104 第二組專題</p></div>
      <div class="footer-links"><a href="group-buys.html">看公開團購</a></div>
    </footer>
  </div>
  <script src="vendors/vue/vue.global.js"></script>
  <script src="js/auth.js"></script><script src="js/header.js"></script>
  <script>
  const { createApp } = Vue;
  createApp({
    data() {
      return { orders: [], loadState: "loading" };
    },
    mounted() {
      if (!NongAuth.getConsumerUser()) { location.href = "login.html?reason=auth"; return; }
      this.reload();
    },
    methods: {
      async reload() {
        try {
          const page = await NongAuth.request("/api/group-buys/orders/mine?size=30");
          this.orders = page.content || [];
          this.loadState = this.orders.length ? "ready" : "empty";
        } catch (e) {
          this.loadState = "error:載入失敗：" + e.message;
        }
      },
      currency(v) {
        return `NT$ ${Number(v).toLocaleString("zh-TW")}`;
      },
      errorText(state) {
        return state.startsWith("error:") ? state.slice(6) : "";
      }
    }
  }).mount("#app");
  </script>
</body>
</html>
